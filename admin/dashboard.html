<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Valttikodit</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="admin-layout">

    <aside class="admin-sidebar" id="sidebar">
        <!-- Renderöidään JS:llä ylläpidon puolella tai suoraan HTMlL:ssä. Tässä suoraan HTML lokaalin yksinkertaisuuden vuoksi -->
        <div class="admin-brand">Valttikodit Admin</div>
        <nav class="admin-nav">
            <a href="dashboard.html" class="active">Liidit</a>
            <a href="projects.html">Kohteet</a>
            <a href="pages.html">Sivut</a>
            <a href="analytics.html">Analytiikka</a>
        </nav>
        <div style="padding: 1rem; border-top: 1px solid var(--border);">
            <div
                style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                admin@valttikodit.local</div>
            <a href="login.html" style="color: red; font-size: 0.875rem; font-weight: 500;">Kirjaudu ulos</a>
        </div>
    </aside>

    <main class="admin-main">
        <h1 style="font-size: 1.875rem; margin-bottom: 2rem;">Liidit</h1>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
            <div class="admin-card" style="border-left: 4px solid var(--primary); max-width: 400px;">
                <h3 style="font-size: 1.125rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">
                    Yhteensä yhteydenottoja (Liidit)</h3>
                <p id="dash-leads-count" style="font-size: 2.25rem; font-weight: 700;">-</p>
            </div>
        </div>

        <!-- Uudet Liidit Taulukko (Avataan Käsittele-napista) -->
        <div id="leads-container" style="display: block;">
            <div class="admin-card" style="padding: 0; overflow-x: auto;">
                <table class="admin-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #f9fafb; border-bottom: 2px solid var(--border);">
                            <th style="padding: 1rem; text-align: left; font-weight: 600; color: var(--text-muted);">Päiväys</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600; color: var(--text-muted);">Nimi</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600; color: var(--text-muted);">Sähköposti</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600; color: var(--text-muted);">Puhelin</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600; color: var(--text-muted);">Lähde</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600; color: var(--text-muted);">Viesti</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 600; color: var(--text-muted);">Tila</th>
                            <th style="padding: 1rem; text-align: right; font-weight: 600; color: var(--text-muted);">Toiminnot</th>
                        </tr>
                    </thead>
                    <tbody id="leads-tbody">
                        <tr><td colspan="8" style="padding: 2rem; text-align: center; color: var(--text-muted);">Ladataan...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../assets/js/admin.js"></script>
</body>

</html>
