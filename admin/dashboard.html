<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Valttikodit</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="admin-layout">

    <aside class="admin-sidebar" id="sidebar">
        <!-- Renderöidään JS:llä ylläpidon puolella tai suoraan HTMlL:ssä. Tässä suoraan HTML lokaalin yksinkertaisuuden vuoksi -->
        <div class="admin-brand">Valttikodit Admin</div>
        <nav class="admin-nav">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="projects.html">Kohteet</a>
            <a href="pages.html">Sivut</a>
        </nav>
        <div style="padding: 1rem; border-top: 1px solid var(--border);">
            <div
                style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">
                admin@valttikodit.local</div>
            <a href="login.html" style="color: red; font-size: 0.875rem; font-weight: 500;">Kirjaudu ulos</a>
        </div>
    </aside>

    <main class="admin-main">
        <h1 style="font-size: 1.875rem; margin-bottom: 2rem;">Dashboard</h1>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
            <div class="admin-card">
                <h3 style="font-size: 1.125rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">
                    Myytävät kohteet</h3>
                <p id="dash-projects-count" style="font-size: 2.25rem; font-weight: 700;">-</p>
            </div>
            <div class="admin-card" style="border-left: 4px solid var(--primary);">
                <h3 style="font-size: 1.125rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">
                    Uudet liidit</h3>
                <p id="dash-leads-count" style="font-size: 2.25rem; font-weight: 700;">-</p>
                <a href="#" onclick="document.getElementById('leads-container').style.display='block'; return false;" style="font-size: 0.875rem; margin-top: 1rem; display: inline-block;">Käsittele &rarr;</a>
            </div>
            <div class="admin-card">
                <h3 style="font-size: 1.125rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted);">
                    Sivukatselut</h3>
                <div style="display: flex; gap: 2rem; align-items: flex-end;">
                  <div>
                    <span style="font-size: 0.875rem; color: var(--text-muted);">7 pv</span>
                    <p style="font-size: 1.75rem; font-weight: 700; color: var(--text-color);" id="pv-7d">-</p>
                  </div>
                  <div>
                    <span style="font-size: 0.875rem; color: var(--text-muted);">30 pv</span>
                    <p style="font-size: 1.75rem; font-weight: 700; color: var(--text-color);" id="pv-30d">-</p>
                  </div>
                  <div>
                    <span style="font-size: 0.875rem; color: var(--text-muted);">12 kk</span>
                    <p style="font-size: 1.75rem; font-weight: 700; color: var(--text-color);" id="pv-12m">-</p>
                  </div>
                </div>
            </div>
        </div>

        <!-- Uudet Liidit Taulukko (Avataan Käsittele-napista) -->
        <div id="leads-container" style="display: none; margin-top: 3rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Yhteydenottopyynnöt (Liidit)</h2>
            <div class="admin-card" style="padding: 0; overflow-x: auto;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Päiväys</th>
                            <th>Nimi</th>
                            <th>Sähköposti</th>
                            <th>Puhelin</th>
                            <th>Viesti</th>
                            <th>Tila</th>
                            <th style="text-align: right;">Toiminnot</th>
                        </tr>
                    </thead>
                    <tbody id="leads-tbody">
                        <tr><td colspan="7">Ladataan...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../assets/js/admin.js"></script>
</body>

</html>
