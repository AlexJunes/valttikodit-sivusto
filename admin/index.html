<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kirjautuminen | Valttikodit</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-box">
            <h1 class="text-center" style="font-size: 1.5rem; margin-bottom: 2rem;">Valttikodit Admin</h1>

            <form id="admin-login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Sähköposti</label>
                    <input class="form-input" type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Salasana</label>
                    <input class="form-input" type="password" id="password" required>
                </div>
                <!-- Demonstroiva harhautuslinkki, koska Auth API ei asennettuna paikallisesti Supabasessa yet -->
                <button type="button" onclick="window.location.href='dashboard.html'" class="btn btn-primary"
                    style="width: 100%;">Kirjaudu Sisään</button>
            </form>

            <p style="font-size: 0.75rem; text-align: center; margin-top: 1rem; color: var(--text-muted);">
                (Tämä demo ohittaa API-kirjautumisen, paina nappia siirtyäksesi paneeliin)
            </p>
        </div>
    </div>

    <!-- Supabase Auth tulee toimimaan admin.js tiedoston kautta todellisessa ratkaisussa -->
    <script type="module" src="../assets/js/admin.js"></script>
</body>

</html>
