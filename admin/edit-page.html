<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muokkaa Sivua | Valttikodit Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
        <div class="admin-brand">Valttikodit Admin</div>
        <nav class="admin-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="projects.html">Kohteet</a>
            <a href="pages.html" class="active">Sivut</a>
            <a href="analytics.html">Analytiikka</a>
        </nav>
        <div style="padding: 1rem; border-top: 1px solid var(--border);">
            <div style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">admin@valttikodit.local</div>
            <a href="login.html" style="color: red; font-size: 0.875rem; font-weight: 500;">Kirjaudu ulos</a>
        </div>
    </aside>

    <main class="admin-main">
        <div style="margin-bottom: 2rem;">
            <a href="pages.html" style="font-size: 0.875rem; color: var(--text-muted); text-decoration: none;">&larr; Takaisin sivulistaukseen</a>
            <h1 style="font-size: 1.875rem; margin-top: 0.5rem;" id="page-title">Sivun muokkaus</h1>
        </div>

        <div class="admin-card" style="max-width: 800px;">
            <form id="edit-page-form">
                
                <div id="dynamic-fields-container">
                    <p style="color: var(--text-muted);">Ladataan sivun sisältöä Supabasesta...</p>
                </div>
                
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" onclick="window.location.href='pages.html'">Peruuta</button>
                    <button type="submit" class="btn btn-primary" id="save-page-btn">Tallenna muutokset</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../assets/js/admin.js"></script>
</body>
</html>
