<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
            .logo-text {
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
                font-weight: 700;
                font-size: 80px;
                fill: #1a1a1a;
                letter-spacing: -2px;
            }
        </style>
    </defs>
    <!-- Läpinäkyvä tausta (valkoinen käytetty vain tarpeen vaatiessa esityksessä) -->
    <rect width="100%" height="100%" fill="transparent" />
    <text x="50%" y="55%" class="logo-text" text-anchor="middle" dominant-baseline="middle">Valttikodit</text>
</svg>
